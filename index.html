<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Suyu</title>

  <link rel="stylesheet" href="style.css">

  <!-- 字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">

  <!-- 左侧栏 -->
  <div class="sidebar">
    <h2>Suyu</h2>
    <div class="menu">
      <div onclick="switchTab('note')">📓 日记</div>
      <div onclick="switchTab('algo')">💻 算法</div>
    </div>
  </div>

  <!-- 主区域 -->
  <div class="main">

    <!-- 编辑 -->
    <div class="editor">
      <textarea id="input" placeholder="写点什么..."></textarea>

      <div class="toolbar">
        <input type="file" id="image" />
        <button onclick="uploadImage()">插入图片</button>
      </div>
    </div>

    <!-- 预览 -->
    <div class="preview" id="preview"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>

</body>
</html>
